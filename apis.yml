aid: clicksend
url: https://raw.githubusercontent.com/api-evangelist/clicksend/refs/heads/main/apis.yml
name: ClickSend
kind: company
description: ClickSend is a cloud communications company providing a single REST API
  for business messaging across SMS, MMS, voice / text-to-speech, transactional email,
  and physical post - letters and postcards printed and mailed globally. The v3 API
  (rest.clicksend.com/v3) uses HTTP Basic authentication with a username and API key
  and covers sending, delivery receipts, inbound handling, contacts and lists, and
  account balance.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Communications
- SMS
- MMS
- Voice
- Email
- Post
- Messaging
- CPaaS
created: '2026-07-01'
modified: '2026-07-01'
specificationVersion: '0.19'
