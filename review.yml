aid: clicksend
name: ClickSend
review:
  question: Does ClickSend expose a documented public WebSocket or event-streaming API?
  answer: false
  date: '2026-07-01'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    ClickSend's real-time/event surface is HTTP webhook callbacks (delivery
    receipts and inbound messages POSTed to a customer-supplied URL, configured
    via the /automations/* endpoints), not a WebSocket or Server-Sent Events
    stream that the client consumes. No AsyncAPI document was authored because
    there is no client-consumed streaming channel to model; the event flow is
    an outbound provider-to-consumer HTTP callback, which is fully described by
    the REST configuration endpoints already in the OpenAPI document.
findings:
  summary: |
    ClickSend does not publish a documented public WebSocket API. The ClickSend
    v3 platform is a REST (HTTPS) API under https://rest.clicksend.com/v3 using
    HTTP Basic authentication (account username + API key). Asynchronous events -
    SMS/MMS/voice/email delivery receipts and inbound SMS - are delivered as
    outbound HTTP webhook callbacks to a URL the customer registers through the
    /automations/* endpoints, and can also be polled through the /*/receipts and
    /sms/inbound REST endpoints. No realtime, bidirectional WebSocket (ws:// or
    wss://) endpoint is documented.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://rest.clicksend.com/v3
      documented: true
    - protocol: Webhook
      scheme: https
      note: Outbound HTTP callbacks to a customer URL for delivery receipts and inbound messages, configured via /automations/* endpoints. Provider-to-consumer, not a client-consumed stream.
      documented: true
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented in the ClickSend v3 API reference or product docs as of the review date.
  authentication:
    scheme: HTTP Basic
    note: Username is the ClickSend account username; password is the API key from the ClickSend dashboard.
  endpointsConfirmedRest:
    - POST https://rest.clicksend.com/v3/sms/send
    - POST https://rest.clicksend.com/v3/sms/price
