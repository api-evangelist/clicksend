    note: Developer hub; v3 REST API over HTTPS with HTTP Basic auth.
  - url: https://developers.clicksend.com/docs/rest/v3/
    type: APIReference
    note: Full v3 endpoint reference; all documented endpoints are HTTPS REST.
  - url: https://github.com/ClickSend/clicksend-go/blob/master/api/swagger.yaml
    type: OpenAPI
    note: Official Swagger 2.0 spec (host rest.clicksend.com, basePath /v3) used to confirm the real endpoint surface.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or client-consumed streaming surface exists. The asynchronous
    event surface is outbound HTTP webhook callbacks configured through REST
    /automations/* endpoints, which are captured in the OpenAPI document and the
    Delivery Receipts & Inbound API entry in apis.yml. No AsyncAPI document was
    authored.
