    - GET  https://rest.clicksend.com/v3/sms/receipts
    - GET  https://rest.clicksend.com/v3/sms/inbound
    - POST https://rest.clicksend.com/v3/mms/send
    - POST https://rest.clicksend.com/v3/mms/price
    - GET  https://rest.clicksend.com/v3/mms/history
