  - subaccount
  - country
- name: mms_messages
  description: MMS messages sent, billed per message by destination country.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - subaccount
  - country
- name: voice_messages
  description: Voice / text-to-speech messages placed, billed per message by destination and duration.
  unit: messages
  aggregation: sum
  dimensions:
  - account
  - subaccount
  - country
- name: emails
  description: Transactional emails sent, billed per email.
  unit: emails
  aggregation: sum
  dimensions:
