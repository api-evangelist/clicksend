principles:
- name: Visibility
  description: Pull usage via GET /account and /account/usage/{year}/{month}/subaccount; monitor prepaid balance.
- name: Allocation
  description: Use subaccounts and custom_string tags to attribute messaging spend to teams and workloads.
- name: Optimization
  description: Estimate cost with the /*/price endpoints before sending; batch recipients; grow prepaid balance to reach lower SMS rate tiers; retire unused dedicated numbers.
- name: Accountability
  description: Assign owners per subaccount and review monthly usage-by-subaccount reports against budget.
