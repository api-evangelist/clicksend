description: >-
  FinOps view of ClickSend spend. ClickSend bills on a prepaid, pay-as-you-go
  basis: account credit is drawn down per SMS segment, per MMS, per voice
  message, per email, and per physical post item (letters, postcards), with
  per-unit rates that vary by destination country and, for post, by page count,
  colour, and duplex. Dedicated numbers carry recurring monthly charges. Because
  billing is prepaid, spend is naturally capped by the credit balance, and each
  channel exposes a /price endpoint for pre-send cost estimation.
notes: >-
  Use the per-channel /*/price endpoints to estimate charges before sending and
  GET /account to monitor the remaining credit balance. Per-unit rates change by
  country; reconcile against the ClickSend pricing pages.
